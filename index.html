<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HouseMatch — find your match. own the whole home.</title>
<meta name="description" content="The funnest way to find a home — swipe to match, run the numbers, book a tour. Plus a command center that fills your units and captures every lead." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F0E8; --paper2:#EFEAE0; --card:#FFFFFF;
  --ink:#1C1815; --ink2:#544C42; --soft:#6E665B; --mute:#9A9286;
  --line:#E8E1D4; --line2:#DAD1C0;
  --brand:#FF5A3C; --brand-d:#E8482B; --brand-soft:#FFEDE7;
  --forest:#0F3D33; --forest-soft:#E4EEEA;
  --sky:#2E6BFF; --gold:#D99A2B; --rose:#FF6B6B; --teal:#16A085;
  --accent:#FF5A3C; --accent2:#E8482B; --blue:#2E6BFF; --panel:#FFFFFF; --panel2:#F4F0E8;
  --r:24px; --rs:15px; --chip:999px;
  --sh-s:0 2px 10px rgba(28,24,21,.05);
  --sh:0 18px 48px -20px rgba(28,24,21,.22);
  --sh-lg:0 44px 100px -36px rgba(28,24,21,.32);
  --maxw:1320px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
.serif{font-family:'Fraunces',Georgia,serif;letter-spacing:-.015em;font-weight:500}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
input,select,textarea{font-family:inherit}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
::selection{background:var(--brand);color:#fff}
::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d8cfbe;border-radius:9px}::-webkit-scrollbar-track{background:transparent}
.muted{color:var(--mute)} .soft{color:var(--soft)}
.nav{position:sticky;top:0;z-index:60;backdrop-filter:saturate(180%) blur(16px);background:rgba(244,240,232,.82);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;gap:6px;height:72px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;letter-spacing:-.03em;margin-right:18px;cursor:pointer}
.mark{width:30px;height:30px;border-radius:10px;background:linear-gradient(145deg,#FF7A4D,#FF4D6D 55%,#FF8A3C);box-shadow:0 8px 18px -6px rgba(255,90,60,.6);position:relative}
.mark::after{content:"";position:absolute;inset:8px 8px auto auto;width:7px;height:7px;border-radius:50%;background:#fff;opacity:.9}
.nlinks{display:flex;gap:3px;flex:1}
.nlink{padding:9px 15px;border-radius:var(--chip);color:var(--ink2);font-weight:550;font-size:14.5px;transition:.16s;white-space:nowrap}
.nlink:hover{color:var(--ink);background:rgba(28,24,21,.05)}
.nlink.on{color:#fff;background:var(--ink);font-weight:600}
.nav-cta{display:flex;gap:9px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:var(--chip);font-weight:600;font-size:14px;transition:.18s;border:1px solid var(--line2);color:var(--ink);background:var(--card);box-shadow:var(--sh-s)}
.btn:hover{background:#fff;transform:translateY(-1px);box-shadow:var(--sh)}
.btn.pri{background:var(--brand);color:#fff;border-color:transparent;box-shadow:0 12px 26px -10px rgba(255,90,60,.7)}
.btn.pri:hover{background:var(--brand-d);box-shadow:0 16px 34px -10px rgba(255,90,60,.8)}
.btn.gho{border-color:transparent;background:transparent;color:var(--ink2);box-shadow:none}
.btn.gho:hover{background:rgba(28,24,21,.05);box-shadow:none}
.btn.sm{padding:8px 14px;font-size:13.5px}
.btn.lg{padding:14px 24px;font-size:15.5px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.pill{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:var(--chip);font-size:12.5px;font-weight:600;border:1px solid var(--line2);background:var(--card);color:var(--ink2);box-shadow:var(--sh-s)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand-d);font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-s)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:var(--sh-s)}
#view{min-height:60vh}
.fade{animation:fade .5s cubic-bezier(.2,.8,.3,1)}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.hero{position:relative;padding:60px 0 24px;overflow:hidden}
.glow{position:absolute;inset:-25% -10% auto 30%;height:560px;z-index:0;background:radial-gradient(45% 55% at 60% 30%,rgba(255,138,90,.22),transparent 62%),radial-gradient(40% 50% at 90% 10%,rgba(46,107,255,.12),transparent 62%);filter:blur(10px);pointer-events:none}
.hero-in{position:relative;z-index:1}
.htitle{font-size:clamp(44px,7vw,88px);line-height:.96;letter-spacing:-.035em;max-width:14ch;font-weight:500}
.htitle em{font-style:italic;color:var(--brand)}
.hsub{margin-top:22px;font-size:19px;color:var(--ink2);max-width:54ch;line-height:1.55}
.stats{display:flex;gap:36px;margin-top:34px;flex-wrap:wrap}
.stat b{font-family:'Fraunces',serif;font-size:34px;display:block;line-height:1;color:var(--ink)}
.stat span{font-size:12.5px;color:var(--mute);font-weight:500}
.searchbox{margin-top:30px;background:var(--card);border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:var(--sh-lg);max-width:940px}
.seg{display:flex;gap:4px;background:var(--paper2);border-radius:var(--chip);padding:5px;width:max-content}
.seg button{padding:9px 18px;border-radius:var(--chip);font-size:14px;font-weight:600;color:var(--ink2);transition:.16s}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--sh-s)}
.srow{display:flex;gap:10px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:7px 7px 7px 18px;margin-top:14px}
.srow input{flex:1;background:none;border:none;color:var(--ink);font-size:16.5px;padding:14px 4px;outline:none}
.srow input::placeholder{color:var(--mute)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.chip{padding:8px 15px;border-radius:var(--chip);font-size:13px;border:1px solid var(--line2);color:var(--ink2);transition:.16s;background:var(--paper);font-weight:550}
.chip:hover{border-color:var(--brand);color:var(--brand-d);background:var(--brand-soft)}
.sh{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:24px}
.sh h2{font-family:'Fraunces',serif;font-weight:500;font-size:36px;letter-spacing:-.025em;max-width:24ch;line-height:1.04}
.section{padding:56px 0}
.life-g{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.life{padding:24px;border-radius:var(--r);border:1px solid var(--line);background:var(--card);position:relative;transition:.22s;cursor:pointer;overflow:hidden;box-shadow:var(--sh-s)}
.life:hover{transform:translateY(-5px);box-shadow:var(--sh)}
.life .ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;background:var(--brand-soft);color:var(--brand-d);margin-bottom:16px;font-size:20px}
.life:nth-child(3) .ic,.life:nth-child(4) .ic{background:var(--forest-soft);color:var(--forest)}
.life h4{font-size:17px;margin-bottom:6px;font-weight:650} .life p{font-size:13.5px;color:var(--mute);line-height:1.5}
.life .n{position:absolute;top:18px;right:20px;font-family:'Fraunces',serif;font-size:14px;color:var(--mute)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:22px}
.prop{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--card);transition:.24s cubic-bezier(.2,.8,.3,1);cursor:pointer;animation:pop .45s ease;box-shadow:var(--sh-s)}
.prop:hover{transform:translateY(-6px);box-shadow:var(--sh-lg)}
.prop.hl{box-shadow:0 0 0 2px var(--brand),var(--sh)}
.prop .ph{height:212px;position:relative;background:#efe9dd;overflow:hidden;margin:8px 8px 0;border-radius:18px}
.prop .ph img{width:100%;height:100%;object-fit:cover;transition:.5s cubic-bezier(.2,.8,.3,1)}
.prop:hover .ph img{transform:scale(1.07)}
.tagrow{position:absolute;top:12px;left:12px;display:flex;gap:6px}
.badge{padding:6px 11px;border-radius:var(--chip);font-size:11.5px;font-weight:700;background:rgba(255,255,255,.92);color:var(--ink);backdrop-filter:blur(6px);box-shadow:var(--sh-s)}
.badge.match{background:var(--brand);color:#fff}
.badge.hot{background:var(--ink);color:#fff}
.save{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.92);color:var(--ink);backdrop-filter:blur(6px);font-size:16px;transition:.16s;box-shadow:var(--sh-s)}
.save:hover{transform:scale(1.1);color:var(--brand)}
.save.on{background:var(--brand);color:#fff}
.prop .body{padding:16px 18px 20px}
.price{font-family:'Fraunces',serif;font-size:24px;font-weight:600}
.price span{font-size:13px;color:var(--mute);font-family:'Inter';font-weight:500}
.addr{color:var(--ink2);font-size:14px;margin-top:3px;font-weight:500}
.facts{display:flex;gap:14px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line);font-size:13px;color:var(--soft)}
.facts b{color:var(--ink);font-weight:650}
.ai-note{margin-top:12px;font-size:12.5px;color:var(--brand-d);background:var(--brand-soft);border-radius:12px;padding:9px 12px;display:flex;gap:8px;line-height:1.4;font-weight:500}
.filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:20px;box-shadow:var(--sh-s)}
.fctrl{display:flex;flex-direction:column;gap:5px}
.fctrl label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--mute);font-weight:700}
.fin{background:var(--paper);border:1px solid var(--line2);border-radius:11px;color:var(--ink);padding:9px 12px;font-size:14px;outline:none;transition:.15s;font-weight:500}
.fin:focus{border-color:var(--brand);background:#fff}
.zsplit{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:start}
.zsplit .maprail{position:sticky;top:88px}
.zsplit .map{height:calc(100vh - 160px);min-height:560px}
.maprail{position:sticky;top:88px}
.map{height:540px;border-radius:var(--r);border:1px solid var(--line);position:relative;overflow:hidden;background:linear-gradient(160deg,#eef1ea,#e7ebe2);box-shadow:var(--sh-s)}
.map .gl{position:absolute;inset:0;opacity:.6;background-image:linear-gradient(rgba(15,61,51,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(15,61,51,.07) 1px,transparent 1px);background-size:46px 46px}
.map .road{position:absolute;background:rgba(255,255,255,.7);border-radius:20px}
.pin{position:absolute;transform:translate(-50%,-50%);background:#fff;border:1px solid var(--line2);padding:6px 11px;border-radius:var(--chip);font-size:12.5px;font-weight:700;cursor:pointer;transition:.16s;white-space:nowrap;box-shadow:var(--sh)}
.pin:hover,.pin.on{background:var(--brand);color:#fff;border-color:transparent;transform:translate(-50%,-50%) scale(1.14);z-index:4}
.pinpop{position:absolute;z-index:6;width:236px;background:#fff;border-radius:18px;box-shadow:var(--sh-lg);overflow:hidden;transform:translate(-50%,calc(-100% - 16px));animation:pop .2s}
.pinpop .x2{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.9);font-size:13px;z-index:2}
.swipe-wrap{max-width:440px;margin:0 auto;position:relative;height:600px;touch-action:pan-y}
.swipe-card{position:absolute;inset:0;border-radius:28px;overflow:hidden;border:1px solid var(--line);background:var(--card);box-shadow:var(--sh-lg);will-change:transform;transition:transform .4s cubic-bezier(.2,.8,.3,1),opacity .35s;user-select:none}
.swipe-card[data-top="true"]{cursor:grab}
.swipe-card.drag{transition:none;cursor:grabbing}
.swipe-card .img{height:68%;position:relative;background:#e7ebe2;pointer-events:none}
.swipe-card .img img{width:100%;height:100%;object-fit:cover}
.swipe-card .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(20,16,12,.82))}
.swipe-card .info{position:absolute;left:0;right:0;bottom:0;padding:22px}
.swipe-card .body{padding:18px 22px;pointer-events:none}
.stamp{position:absolute;top:26px;padding:10px 18px;border-radius:14px;font-weight:800;font-size:26px;border:4px solid;opacity:0;transition:.05s;transform:rotate(-14deg);letter-spacing:.04em;z-index:3}
.stamp.like{left:22px;color:var(--brand);border-color:var(--brand)}
.stamp.nope{right:22px;color:var(--ink);border-color:var(--ink);transform:rotate(14deg)}
.swipe-ctrls{display:flex;justify-content:center;gap:20px;margin-top:26px}
.scbtn{width:66px;height:66px;border-radius:50%;display:grid;place-items:center;font-size:25px;border:1px solid var(--line);background:var(--card);transition:.16s;box-shadow:var(--sh)}
.scbtn:hover{transform:scale(1.1) translateY(-2px)}
.scbtn.no:hover{color:var(--ink);border-color:var(--ink)}
.scbtn.yes{background:var(--brand);color:#fff;border-color:transparent;box-shadow:0 14px 30px -10px rgba(255,90,60,.7)}
.scbtn.yes:hover{background:var(--brand-d)}
.scbtn.info2:hover{color:var(--sky);border-color:var(--sky)}
.pd-g{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;height:460px;border-radius:var(--r);overflow:hidden}
.pd-g>div{background:#e7ebe2;position:relative;overflow:hidden}
.pd-g>div:first-child{grid-row:1/3}
.pd-g img{width:100%;height:100%;object-fit:cover;transition:.4s}
.pd-g>div:hover img{transform:scale(1.05)}
.pd-grid{display:grid;grid-template-columns:1fr 380px;gap:34px;margin-top:30px;align-items:start}
.kv{display:flex;gap:26px;margin:18px 0;flex-wrap:wrap}
.kv div b{display:block;font-family:'Fraunces',serif;font-size:23px;font-weight:600} .kv div span{font-size:12px;color:var(--mute);font-weight:500}
.ring{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;position:relative;flex:0 0 auto}
.ring::before{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--card)}
.ring b{position:relative;font-family:'Fraunces',serif;font-size:23px;font-weight:600}
.feat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.feat div{padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:13.5px;color:var(--ink2);background:var(--card);font-weight:500}
.book{position:sticky;top:88px}
.book .panel{box-shadow:var(--sh)}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.row.tot{border:none;font-weight:700;font-size:16px;padding-top:13px}
.range{width:100%;accent-color:var(--brand);margin-top:7px}
.score{margin-bottom:11px}
.score .t{display:flex;justify-content:space-between;font-size:13px;font-weight:550}
.score .bar{height:7px;border-radius:99px;background:var(--paper2);margin-top:5px;overflow:hidden}
.score .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--brand),#ffb59f)}
.nb-school{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{padding:20px;border-radius:18px;border:1px solid var(--line);background:var(--card);box-shadow:var(--sh-s)}
.kpi .l{font-size:12.5px;color:var(--mute);font-weight:500}
.kpi b{font-family:'Fraunces',serif;font-size:32px;display:block;margin-top:8px;line-height:1;font-weight:600}
.kpi .d{font-size:12.5px;font-weight:650;margin-top:8px}
.up{color:var(--teal)} .down{color:var(--rose)}
.bars{display:flex;align-items:flex-end;gap:10px;height:154px;margin-top:6px}
.bars .b{flex:1;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--brand),#ffb59f);transition:.3s}
.bars .b.alt{background:linear-gradient(180deg,var(--forest),#7fb3a4)}
.donut{width:148px;height:148px;border-radius:50%;position:relative}
.donut::before{content:"";position:absolute;inset:23px;border-radius:50%;background:var(--card)}
.donut .c{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.lg-i{display:inline-block;width:11px;height:11px;border-radius:4px;margin-right:8px}
.pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.col{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px;min-height:130px}
.col h5{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);margin-bottom:12px;display:flex;justify-content:space-between;font-weight:700}
.appcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;cursor:grab;transition:.16s;animation:pop .3s;box-shadow:var(--sh-s)}
.appcard:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.appcard .nm{font-weight:650;font-size:13.5px}
.appcard .meta{font-size:11.5px;color:var(--mute);margin-top:4px}
.appcard .sco{display:inline-block;margin-top:9px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--chip);background:var(--brand-soft);color:var(--brand-d)}
.appcard .adv{margin-top:10px;width:100%;font-size:12px;padding:7px;border-radius:9px;background:var(--paper);border:1px solid var(--line2);transition:.16s;font-weight:600}
.appcard .adv:hover{background:var(--brand);color:#fff;border-color:transparent}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mute);font-weight:700;padding:0 10px 12px}
td{padding:13px 10px;border-top:1px solid var(--line);font-size:14px;color:var(--ink2)}
td b{color:var(--ink);font-weight:650}
.statp{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--chip);font-size:11.5px;font-weight:650}
.s-ok{background:var(--forest-soft);color:var(--forest)} .s-late{background:#ffe7e3;color:var(--brand-d)}
.s-soon{background:#fbf0d8;color:var(--gold)} .s-new{background:#e4edff;color:var(--sky)}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;color:var(--ink2);margin-bottom:7px;font-weight:550}
.input,textarea,select.input{width:100%;background:var(--paper);border:1px solid var(--line2);border-radius:12px;color:var(--ink);padding:13px 14px;font-size:14.5px;outline:none;transition:.15s;font-weight:500}
.input:focus,textarea:focus{border-color:var(--brand);background:#fff}
textarea{resize:vertical;min-height:96px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.steps{display:flex;gap:9px;margin-bottom:24px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:10px;padding:11px 17px;border-radius:14px;border:1px solid var(--line);font-size:14px;color:var(--ink2);background:var(--card)}
.step.on{border-color:var(--brand);color:var(--ink);background:var(--brand-soft)}
.step .sn{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:12.5px;font-weight:700;background:var(--paper2)}
.step.on .sn{background:var(--brand);color:#fff}
.ai-write{display:flex;gap:10px;align-items:center;background:var(--brand-soft);border:1px dashed rgba(255,90,60,.4);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--brand-d);margin-top:9px;cursor:pointer;transition:.15s;font-weight:550}
.ai-write:hover{background:#ffe0d6}
.dash{display:grid;grid-template-columns:224px 1fr;gap:26px;align-items:start}
.side{position:sticky;top:88px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:var(--sh-s)}
.side a{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;font-size:14px;color:var(--ink2);font-weight:550;transition:.14s;cursor:pointer}

.side a.on{background:var(--ink);color:#fff}

function quick(t){go('search');setTimeout(()=>{const q=document.getElementById('sq');if(q){q.value=t;applyParsed(t);}},60);}
function doSearch(){const t=(document.getElementById('q')||{}).value||'';go('search');setTimeout(()=>{const q=document.getElementById('sq');if(q){q.value=t;applyParsed(t);}},60);}

let SF={kind:'all',min:0,max:1000000,beds:0,pet:false,sort:'match',q:''};
function applyParsed(t){const s=t.toLowerCase();SF.pet=/pet|dog|cat/.test(s);const b=s.match(/(\d)\s*(bed|br|bedroom)/);if(b)SF.beds=+b[1];if(/buy|first-time|purchase/.test(s))SF.kind='buy';else if(/rent/.test(s))SF.kind='rent';const m=s.match(/(?:under|below)\s*\$?\s*([\d,]+)/);if(m)SF.max=+m[1].replace(/,/g,'');SF.q=t;syncFilterUI();renderResults();toast('✦ AI turned your words into filters');}
function readFilters(){SF.kind=val('f_kind');SF.min=+val('f_min')||0;SF.max=+val('f_max')||1000000;SF.beds=+val('f_beds')||0;SF.pet=document.getElementById('f_pet').checked;SF.sort=val('f_sort');renderResults();}
const val=id=>{const e=document.getElementById(id);return e?e.value:'';};
function syncFilterUI(){if(document.getElementById('f_kind')){document.getElementById('f_kind').value=SF.kind;document.getElementById('f_beds').value=SF.beds;document.getElementById('f_pet').checked=SF.pet;if(SF.max<1000000)document.getElementById('f_max').value=SF.max;}}
function filtered(){let r=HOMES.filter(h=>(SF.kind==='all'||h.kind===SF.kind||(SF.kind==='invest'&&h.kind==='buy'))&&h.price>=SF.min&&h.price<=SF.max&&h.beds>=SF.beds&&(!SF.pet||h.pet));
 r.sort((a,b)=>SF.sort==='price'?a.price-b.price:SF.sort==='new'?a.days-b.days:b.match-a.match);return r;}
VIEWS.search=()=>`
<section class="wrap section">
 <div class="sh"><div><span class="eyebrow">Search</span><h2 class="serif" style="margin-top:8px;font-size:30px">Find your place</h2></div>
  <button class="btn" onclick="go('match')">Prefer to swipe? →</button></div>
 <div class="filters">
  <div class="srow" style="margin:0;flex:1;min-width:240px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--mute)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg><input id="sq" placeholder="Describe your dream home…" onkeydown="if(event.key==='Enter')applyParsed(this.value)" style="font-size:14px;padding:10px 4px"><button class="btn pri sm" onclick="applyParsed(document.getElementById('sq').value)">Go</button></div>

  <div class="fctrl"><label>Max $</label><input class="fin" id="f_max" style="width:100px" placeholder="Any" onchange="readFilters()"></div>
  <div class="fctrl"><label>Beds</label><select class="fin" id="f_beds" onchange="readFilters()"><option value="0">Any</option><option value="1">1+</option><option value="2">2+</option><option value="3">3+</option></select></div>
  <div class="fctrl"><label>Pets</label><label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2);padding:8px 0"><input type="checkbox" id="f_pet" onchange="readFilters()" style="accent-color:var(--brand)"> OK</label></div>
  <div class="fctrl"><label>Sort</label><select class="fin" id="f_sort" onchange="readFilters()"><option value="match">Best match</option><option value="price">Price</option><option value="new">Newest</option></select></div>
 </div>
 <div class="zsplit"><div style="min-width:0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><p class="muted" id="rcount" style="font-size:14px"></p><button class="btn gho sm" onclick="resetFilters()">Reset</button></div><div class="grid" id="results" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))"></div></div>
  <div class="maprail"><div class="map" id="map" onclick="if(event.target.id==='map')closePinPop()"><div class="gl"></div><div class="road" style="left:0;right:0;top:46%;height:9px"></div><div class="road" style="top:0;bottom:0;left:40%;width:9px"></div></div>
   <div class="card" style="padding:15px;margin-top:13px"><div style="display:flex;gap:8px;align-items:center;font-size:13px"><span class="dot"></span><b>Map view</b></div><p class="muted" style="font-size:12.5px;margin-top:7px">Hover a listing to light up its pin. Tap a pin to preview the home.</p></div></div>
 </div>
</section>`;
VIEWS._after_search=()=>{syncFilterUI();renderResults();};
function renderResults(){const r=filtered();const el=document.getElementById('results');if(!el)return;el.innerHTML=r.length?r.map(card).join(''):'<p class="muted" style="padding:30px">No homes match — try widening your filters.</p>';document.getElementById('rcount').innerHTML=`<b style="color:var(--ink)">${r.length}</b> home${r.length!==1?'s':''} · sorted by ${SF.sort==='match'?'best match':SF.sort}`;const map=document.getElementById('map');if(map){map.querySelectorAll('.pin,.pinpop').forEach(p=>p.remove());r.forEach(h=>{const p=document.createElement('button');p.className='pin';p.id='pin-'+h.id;p.style.left=h.lng+'%';p.style.top=h.lat+'%';p.textContent=h.kind==='rent'?'$'+(h.price/1000).toFixed(1)+'k':'$'+Math.round(h.price/1000)+'k';p.onmouseenter=()=>hlCard(h.id,1);p.onmouseleave=()=>hlCard(h.id,0);p.onclick=(e)=>showPinPop(h.id,e);map.appendChild(p);});}}
function resetFilters(){SF={kind:'all',min:0,max:1000000,beds:0,pet:false,sort:'match',q:''};syncFilterUI();const mn=document.getElementById('f_min'),mx=document.getElementById('f_max'),sq=document.getElementById('sq');if(mn)mn.value='';if(mx)mx.value='';if(sq)sq.value='';renderResults();}
function hlPin(id,on){const p=document.getElementById('pin-'+id);if(p)p.classList.toggle('on',!!on);}
function hlCard(id,on){const c=document.querySelector('.prop[data-id="'+id+'"]');if(c){c.classList.toggle('hl',!!on);if(on)c.scrollIntoView({block:'nearest',behavior:'smooth'});}}
function closePinPop(){const m=document.getElementById('map');if(m)m.querySelectorAll('.pinpop').forEach(x=>x.remove());}
function showPinPop(id,e){if(e)e.stopPropagation();const map=document.getElementById('map');if(!map)return;closePinPop();const h=home(id),pin=document.getElementById('pin-'+id);const pop=document.createElement('div');pop.className='pinpop';pop.style.left=pin.style.left;pop.style.top=pin.style.top;pop.innerHTML=`<button class="x2" onclick="closePinPop()">✕</button><div style="height:124px;background:#e7ebe2"><img src="${U(PH[h.img])}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.opacity=0"></div><div style="padding:13px"><div class="price" style="font-size:19px">${money(h.price)}<span>${h.kind==='rent'?' /mo':''}</span></div><div style="font-size:12.5px;color:var(--ink2);margin:2px 0 10px">${h.title}</div><button class="btn pri sm" style="width:100%" onclick="go('property','${id}')">View home →</button></div>`;map.appendChild(pop);}

let swipeIdx=0,swipeDeck=[],_dm,_du;
VIEWS.match=()=>{swipeDeck=HOMES.filter(h=>!likes.includes(h.id));swipeIdx=0;return `

 <div style="text-align:center;max-width:560px;margin:0 auto 22px"><span class="eyebrow">Swipe & match</span>
  <h2 class="serif" style="font-size:32px;margin-top:9px">Swipe right on homes you love</h2>

 <div class="swipe-wrap" id="deck"></div>
 <div class="swipe-ctrls"><button class="scbtn no" onclick="swipe('no')">✕</button><button class="scbtn info2" onclick="if(swipeDeck[swipeIdx])go('property',swipeDeck[swipeIdx].id)">ⓘ</button><button class="scbtn yes" onclick="swipe('yes')">♥</button></div>

function clearDrag(){if(_dm)window.removeEventListener('pointermove',_dm);if(_du)window.removeEventListener('pointerup',_du);_dm=_du=null;}
function renderDeck(){const d=document.getElementById('deck');if(!d)return;if(swipeIdx>=swipeDeck.length){d.innerHTML=`<div class="swipe-card" style="display:grid;place-items:center;text-align:center;padding:30px"><div><div style="font-size:42px;margin-bottom:10px">🎉</div><h3 class="serif" style="font-size:26px">That's everyone!</h3><p class="muted" style="margin:8px 0 18px">You loved ${likes.length} home${likes.length!==1?'s':''}. We'll keep matching you to more like them.</p><button class="btn pri" onclick="openLeads()">See your matches</button> <button class="btn" onclick="go('search')">Back to search</button></div></div>`;document.getElementById('swipeProg').textContent='';return;}
 const top=swipeDeck.slice(swipeIdx,swipeIdx+2).reverse();
 d.innerHTML=top.map((h,i)=>{const isTop=i===top.length-1;return `<div class="swipe-card" data-top="${isTop}" style="transform:scale(${isTop?1:.95}) translateY(${isTop?0:14}px)">
   <div class="stamp like">LOVE</div><div class="stamp nope">NOPE</div>
   <div class="img"><img src="${U(PH[h.img])}" onerror="this.style.opacity=0"><div class="grad"></div>
    <div class="info"><div style="display:flex;gap:6px;margin-bottom:8px"><span class="badge match">★ ${h.match} match</span><span class="badge">${h.kind==='rent'?'Rent':'Buy'}</span></div>
     <div class="price" style="font-size:27px;color:#fff">${money(h.price)}<span style="color:#e7ddd4">${h.kind==='rent'?' /mo':''}</span></div>
     <div style="color:#f0e9e1;font-size:14px;margin-top:2px">${h.title} · ${h.city}</div></div></div>
   <div class="body"><div class="facts" style="border:none;margin:0;padding:0;font-size:13px"><span><b>${h.beds}</b> bd</span><span><b>${h.baths}</b> ba</span><span><b>${h.sqft.toLocaleString()}</b> sqft</span><span style="margin-left:auto">${h.pet?'🐾 pet ok':''}</span></div>
    <div class="ai-note" style="margin-top:11px">✦ ${h.note}</div></div></div>`;}).join('');
 document.getElementById('swipeProg').textContent=`${swipeIdx+1} of ${swipeDeck.length} · ${likes.length} loved`;attachDrag();}
function attachDrag(){clearDrag();const card=document.querySelector('.swipe-card[data-top="true"]');if(!card||swipeIdx>=swipeDeck.length)return;const like=card.querySelector('.stamp.like'),nope=card.querySelector('.stamp.nope');let sx=0,sy=0,dx=0,dy=0,drag=false;
 card.addEventListener('pointerdown',e=>{drag=true;sx=e.clientX;sy=e.clientY;card.classList.add('drag');card.setPointerCapture&&card.setPointerCapture(e.pointerId);});
 _dm=e=>{if(!drag)return;dx=e.clientX-sx;dy=e.clientY-sy;card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/18}deg)`;const k=Math.min(Math.abs(dx)/120,1);if(dx>0){like.style.opacity=k;nope.style.opacity=0;}else if(dx<0){nope.style.opacity=k;like.style.opacity=0;}};
 _du=()=>{if(!drag)return;drag=false;card.classList.remove('drag');if(Math.abs(dx)>110){swipe(dx>0?'yes':'no');}else{card.style.transform='';like.style.opacity=0;nope.style.opacity=0;}dx=0;};
 window.addEventListener('pointermove',_dm);window.addEventListener('pointerup',_du);}
function swipe(dir){if(swipeIdx>=swipeDeck.length)return;clearDrag();const cards=document.querySelectorAll('.swipe-card');const topCard=[...cards].find(c=>c.dataset.top==='true');const h=swipeDeck[swipeIdx];if(topCard){const st=topCard.querySelector(dir==='yes'?'.stamp.like':'.stamp.nope');if(st)st.style.opacity=1;topCard.style.transform=`translate(${dir==='yes'?620:-620}px,40px) rotate(${dir==='yes'?20:-20}deg)`;topCard.style.opacity=0;}
 if(dir==='yes'){if(!likes.includes(h.id))likes.push(h.id);if(!saved.includes(h.id))saved.push(h.id);persist();toast('♥ Loved '+h.title);}
 swipeIdx++;setTimeout(renderDeck,320);}

VIEWS._after_property=(id)=>{const h=home(id);if(!h)return;if(h.kind==='buy')calcMortgage(id);else calcAfford(id);};
function calcMortgage(id){const h=home(id);const dp=+document.getElementById('dp').value,rt=+document.getElementById('rt').value;document.getElementById('dpv').textContent=dp+'%';document.getElementById('rtv').textContent=rt+'%';const loan=h.price*(1-dp/100);const r=rt/100/12,n=360;const m=loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);document.getElementById('loanv').textContent=money(Math.round(loan));document.getElementById('mov').textContent=money(Math.round(m))+'/mo';document.getElementById('closev').textContent=money(Math.round(h.price*dp/100+h.price*0.03));}
function calcAfford(id){const h=home(id);const inc=+document.getElementById('inc').value;document.getElementById('incv').textContent=money(inc);const rti=Math.round(h.price/inc*100);document.getElementById('rtiv').textContent=rti+'% of income';const v=document.getElementById('verdictv');if(rti<=30){v.textContent='Comfortable ✓';v.style.color='var(--teal)';}else if(rti<=40){v.textContent='A stretch';v.style.color='var(--gold)';}else{v.textContent='Over budget';v.style.color='var(--rose)';}}

function advance(stage,i){const idx=STAGES.indexOf(stage);const next=STAGES[idx+1];const a=PIPELINE[stage].splice(i,1)[0];PIPELINE[next].push(a);if(next==='leased'){confetti();toast('🎉 '+a.n+' signed — unit filled, occupancy up!');}else{toast(a.n+' → '+STAGE_LABEL[next]);}render();}
