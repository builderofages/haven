<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HouseMatch — find your match. own the whole home.</title>
<meta name="description" content="The funnest way to find a home — swipe to match, run the numbers, book a tour. Plus a command center that fills your units and captures every lead." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0b; --bg2:#0e110f; --panel:#14181a; --panel2:#1a1f1f;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --ink:#f5f4ef; --soft:#bcc0b8; --mute:#7f857b;
  --accent:#c9f257; --accent2:#a8d63a; --gold:#e8c98a; --blue:#7db8ff; --rose:#ff9b8a; --teal:#6fe0c5;
  --r:18px; --rs:12px; --shadow:0 30px 80px -30px rgba(0,0,0,.75);
  --maxw:1280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
.serif{font-family:'Fraunces',Georgia,serif;letter-spacing:-.01em}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
input,select,textarea{font-family:inherit}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
::selection{background:var(--accent);color:#0a0c08}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#272c28;border-radius:9px}

/* nav */
.nav{position:sticky;top:0;z-index:60;backdrop-filter:saturate(160%) blur(18px);background:rgba(10,12,11,.72);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;gap:6px;height:64px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:18px;letter-spacing:-.02em;margin-right:14px;cursor:pointer}
.mark{width:26px;height:26px;border-radius:8px;background:conic-gradient(from 210deg,var(--accent),var(--teal) 40%,var(--blue) 70%,var(--accent));box-shadow:0 0 0 1px rgba(255,255,255,.12),0 6px 18px -6px var(--accent)}
.nlinks{display:flex;gap:2px;flex:1}
.nlink{padding:8px 13px;border-radius:10px;color:var(--soft);font-weight:500;font-size:14px;transition:.16s;white-space:nowrap}
.nlink:hover{color:var(--ink);background:rgba(255,255,255,.05)}
.nlink.on{color:#0a0c08;background:var(--accent);font-weight:600}
.nav-cta{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 15px;border-radius:11px;font-weight:600;font-size:14px;transition:.16s;border:1px solid var(--line2);color:var(--ink);background:rgba(255,255,255,.03)}
.btn:hover{background:rgba(255,255,255,.09);transform:translateY(-1px)}
.btn.pri{background:var(--accent);color:#0a0c08;border-color:transparent}
.btn.pri:hover{background:#d6ff6e;box-shadow:0 10px 30px -10px var(--accent)}
.btn.gho{border-color:transparent;background:transparent;color:var(--soft)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:9px}
.btn.lg{padding:13px 22px;font-size:15px;border-radius:13px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--soft)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent2);font-weight:600}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.muted{color:var(--mute)} .soft{color:var(--soft)}

#view{min-height:60vh}
.fade{animation:fade .45s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

/* hero */
.hero{position:relative;padding:60px 0 26px;overflow:hidden}
.glow{position:absolute;inset:-30% -10% auto -10%;height:600px;z-index:0;background:radial-gradient(50% 60% at 20% 30%,rgba(201,242,87,.16),transparent 60%),radial-gradient(45% 55% at 82% 18%,rgba(125,184,255,.15),transparent 60%);filter:blur(8px);pointer-events:none}
.hero-in{position:relative;z-index:1}
.htitle{font-size:clamp(40px,6.6vw,80px);line-height:.97;letter-spacing:-.03em;max-width:15ch;font-weight:500}
.htitle em{font-style:italic;color:var(--accent)}
.hsub{margin-top:20px;font-size:18px;color:var(--soft);max-width:56ch}
.stats{display:flex;gap:30px;margin-top:32px;flex-wrap:wrap}
.stat b{font-family:'Fraunces',serif;font-size:30px;display:block;line-height:1}
.stat span{font-size:12.5px;color:var(--mute)}

/* search bar */
.searchbox{margin-top:30px;background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:14px;box-shadow:var(--shadow);max-width:920px}
.seg{display:flex;gap:4px;background:#0c0e0c;border:1px solid var(--line);border-radius:11px;padding:4px;width:max-content}
.seg button{padding:8px 15px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--soft);transition:.15s}
.seg button.on{background:var(--accent);color:#0a0c08}
.srow{display:flex;gap:10px;align-items:center;background:#0c0e0c;border:1px solid var(--line);border-radius:14px;padding:6px 6px 6px 15px;margin-top:12px}
.srow input{flex:1;background:none;border:none;color:var(--ink);font-size:16px;padding:13px 4px;outline:none}
.srow input::placeholder{color:var(--mute)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{padding:7px 13px;border-radius:999px;font-size:13px;border:1px solid var(--line);color:var(--soft);transition:.15s;background:rgba(255,255,255,.02)}
.chip:hover{border-color:var(--accent);color:var(--ink)}

/* section header */
.sh{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:22px}
.sh h2{font-family:'Fraunces',serif;font-weight:500;font-size:32px;letter-spacing:-.02em;max-width:22ch;line-height:1.05}
.section{padding:54px 0}

/* lifecycle */
.life-g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.life{padding:20px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),#0f1311);position:relative;transition:.2s;cursor:pointer;overflow:hidden}
.life:hover{transform:translateY(-4px);border-color:var(--line2)}
.life .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:rgba(201,242,87,.12);color:var(--accent);margin-bottom:13px;font-size:18px}
.life h4{font-size:16px;margin-bottom:6px} .life p{font-size:13.5px;color:var(--mute);line-height:1.45}
.life .n{position:absolute;top:14px;right:16px;font-family:'Fraunces',serif;font-size:13px;color:var(--mute)}

/* cards / grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.prop{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel);transition:.22s;cursor:pointer;animation:pop .4s ease}
.prop:hover{transform:translateY(-5px);border-color:var(--line2);box-shadow:var(--shadow)}
.prop .ph{height:196px;position:relative;background:linear-gradient(135deg,#243024,#11201f);overflow:hidden}
.prop .ph img{width:100%;height:100%;object-fit:cover;transition:.4s}
.prop:hover .ph img{transform:scale(1.06)}
.tagrow{position:absolute;top:12px;left:12px;display:flex;gap:6px}
.badge{padding:5px 10px;border-radius:8px;font-size:11.5px;font-weight:700;backdrop-filter:blur(6px);background:rgba(8,10,8,.6);border:1px solid rgba(255,255,255,.14)}
.badge.match{background:var(--accent);color:#0a0c08;border-color:transparent}
.badge.hot{background:var(--rose);color:#1a0a08;border-color:transparent}
.save{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:rgba(8,10,8,.55);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(6px);font-size:15px;transition:.15s}
.save:hover{background:var(--accent);color:#0a0c08}
.save.on{background:var(--rose);color:#1a0a08;border-color:transparent}
.prop .body{padding:15px}
.price{font-family:'Fraunces',serif;font-size:22px}
.price span{font-size:13px;color:var(--mute);font-family:'Inter'}
.addr{color:var(--soft);font-size:13.5px;margin-top:3px}
.facts{display:flex;gap:13px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:12.5px;color:var(--soft)}
.facts b{color:var(--ink)}
.ai-note{margin-top:11px;font-size:12px;color:var(--accent2);background:rgba(201,242,87,.07);border:1px solid rgba(201,242,87,.18);padding:8px 10px;border-radius:9px;display:flex;gap:7px}

/* filter bar */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:18px}
.fctrl{display:flex;flex-direction:column;gap:4px}
.fctrl label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--mute);font-weight:600}
.fin{background:#0c0e0c;border:1px solid var(--line2);border-radius:9px;color:var(--ink);padding:8px 10px;font-size:13.5px;outline:none;transition:.15s}
.fin:focus{border-color:var(--accent)}
.layout{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
.maprail{position:sticky;top:80px}
.map{height:520px;border-radius:16px;border:1px solid var(--line);position:relative;overflow:hidden;background:radial-gradient(120% 120% at 30% 20%,#1a2420,#0c0f0d 70%)}
.map .gl{position:absolute;inset:0;opacity:.45;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:44px 44px}
.map .road{position:absolute;background:rgba(255,255,255,.05);border-radius:20px}
.pin{position:absolute;transform:translate(-50%,-50%);background:var(--panel2);border:1px solid var(--line2);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;box-shadow:0 6px 18px -8px #000}
.pin:hover,.pin.on{background:var(--accent);color:#0a0c08;border-color:transparent;transform:translate(-50%,-50%) scale(1.1);z-index:3}

/* match / swipe */
.swipe-wrap{max-width:460px;margin:0 auto;position:relative;height:560px}
.swipe-card{position:absolute;inset:0;border-radius:22px;overflow:hidden;border:1px solid var(--line2);background:var(--panel);box-shadow:var(--shadow);will-change:transform;transition:transform .35s cubic-bezier(.2,.8,.3,1),opacity .35s}
.swipe-card .img{height:62%;position:relative;background:#1a2420}
.swipe-card .img img{width:100%;height:100%;object-fit:cover}
.swipe-card .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(8,10,8,.85))}
.swipe-card .info{position:absolute;left:0;right:0;bottom:0;padding:18px}
.swipe-card .body{padding:18px}
.stamp{position:absolute;top:24px;padding:8px 16px;border-radius:12px;font-weight:800;font-size:24px;border:3px solid;opacity:0;transition:.1s;transform:rotate(-12deg)}
.stamp.like{left:20px;color:var(--accent);border-color:var(--accent)}
.stamp.nope{right:20px;color:var(--rose);border-color:var(--rose);transform:rotate(12deg)}
.swipe-ctrls{display:flex;justify-content:center;gap:18px;margin-top:24px}
.scbtn{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;font-size:24px;border:1px solid var(--line2);background:var(--panel);transition:.15s}
.scbtn:hover{transform:scale(1.08)}
.scbtn.no:hover{border-color:var(--rose);color:var(--rose)}
.scbtn.yes:hover{border-color:var(--accent);color:var(--accent)}
.scbtn.info2:hover{border-color:var(--blue);color:var(--blue)}

/* property detail */
.pd-g{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;height:440px;border-radius:18px;overflow:hidden}
.pd-g>div{background:#1a2420;position:relative;overflow:hidden}
.pd-g>div:first-child{grid-row:1/3}
.pd-g img{width:100%;height:100%;object-fit:cover}
.pd-grid{display:grid;grid-template-columns:1fr 360px;gap:30px;margin-top:28px;align-items:start}
.kv{display:flex;gap:24px;margin:16px 0;flex-wrap:wrap}
.kv div b{display:block;font-family:'Fraunces',serif;font-size:21px} .kv div span{font-size:12px;color:var(--mute)}
.ring{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;position:relative;flex:0 0 auto}
.ring::before{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--panel)}
.ring b{position:relative;font-family:'Fraunces',serif;font-size:21px}
.feat{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.feat div{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;color:var(--soft)}
.book{position:sticky;top:80px}
.row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.row.tot{border:none;font-weight:700;font-size:16px;padding-top:12px}
.range{width:100%;accent-color:var(--accent);margin-top:6px}

/* KPI / dash */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{padding:18px;border-radius:15px;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),#0f1311)}
.kpi .l{font-size:12px;color:var(--mute)}
.kpi b{font-family:'Fraunces',serif;font-size:30px;display:block;margin-top:7px;line-height:1}
.kpi .d{font-size:12px;font-weight:600;margin-top:7px}
.up{color:var(--accent2)} .down{color:var(--rose)}
.bars{display:flex;align-items:flex-end;gap:9px;height:150px;margin-top:6px}
.bars .b{flex:1;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--accent),rgba(201,242,87,.25));transition:.3s}
.bars .b.alt{background:linear-gradient(180deg,rgba(125,184,255,.9),rgba(125,184,255,.2))}
.donut{width:140px;height:140px;border-radius:50%;position:relative}
.donut::before{content:"";position:absolute;inset:22px;border-radius:50%;background:var(--panel)}
.donut .c{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.lg-i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px}

/* pipeline */
.pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.col{background:#0d100e;border:1px solid var(--line);border-radius:13px;padding:12px;min-height:120px}
.col h5{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);margin-bottom:10px;display:flex;justify-content:space-between}
.appcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:9px;cursor:grab;transition:.15s;animation:pop .3s}
.appcard:hover{border-color:var(--line2);transform:translateY(-2px)}
.appcard .nm{font-weight:600;font-size:13.5px}
.appcard .meta{font-size:11.5px;color:var(--mute);margin-top:3px}
.appcard .sco{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(201,242,87,.13);color:var(--accent2)}
.appcard .adv{margin-top:9px;width:100%;font-size:12px;padding:6px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--line);transition:.15s}
.appcard .adv:hover{background:var(--accent);color:#0a0c08}

/* table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mute);font-weight:600;padding:0 10px 11px}
td{padding:12px 10px;border-top:1px solid var(--line);font-size:13.5px;color:var(--soft)}
td b{color:var(--ink)}
.statp{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:600}
.s-ok{background:rgba(201,242,87,.13);color:var(--accent2)} .s-late{background:rgba(255,155,138,.13);color:var(--rose)}
.s-soon{background:rgba(232,201,138,.14);color:var(--gold)} .s-new{background:rgba(125,184,255,.13);color:var(--blue)}

/* forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--soft);margin-bottom:6px;font-weight:500}
.input,textarea,select.input{width:100%;background:#0c0e0c;border:1px solid var(--line2);border-radius:11px;color:var(--ink);padding:12px 13px;font-size:14.5px;outline:none;transition:.15s}
.input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:90px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.steps{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:9px;padding:10px 15px;border-radius:12px;border:1px solid var(--line);font-size:13.5px;color:var(--soft)}
.step.on{border-color:var(--accent);color:var(--ink);background:rgba(201,242,87,.06)}
.step .sn{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;background:rgba(255,255,255,.06)}
.step.on .sn{background:var(--accent);color:#0a0c08}
.ai-write{display:flex;gap:9px;align-items:center;background:rgba(201,242,87,.07);border:1px dashed rgba(201,242,87,.35);border-radius:11px;padding:11px 13px;font-size:13px;color:var(--accent2);margin-top:8px;cursor:pointer;transition:.15s}
.ai-write:hover{background:rgba(201,242,87,.12)}

/* sidebar dash */
.dash{display:grid;grid-template-columns:210px 1fr;gap:24px;align-items:start}
.side{position:sticky;top:80px;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:12px}
.side a{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;font-size:13.5px;color:var(--soft);font-weight:500;transition:.14s;cursor:pointer}
.side a:hover{background:rgba(255,255,255,.04);color:var(--ink)}
.side a.on{background:rgba(201,242,87,.12);color:var(--accent)}
.side .sep{height:1px;background:var(--line);margin:9px 6px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,7,6,.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;animation:fade .25s}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:26px;max-width:440px;width:100%;box-shadow:var(--shadow);animation:pop .3s}
.modal h3{font-family:'Fraunces',serif;font-size:24px;margin-bottom:4px}
.x{position:absolute;top:16px;right:18px;font-size:20px;color:var(--mute)}

/* toast + confetti */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(140px);z-index:200;background:var(--panel2);border:1px solid var(--line2);border-radius:13px;padding:13px 18px;font-size:14px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:center;transition:.4s cubic-bezier(.2,.9,.3,1);max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.cf{position:fixed;width:10px;height:14px;z-index:300;pointer-events:none;top:-20px}

.foot{border-top:1px solid var(--line);margin-top:40px;padding:44px 0 56px;color:var(--mute);font-size:13px}
.foot-g{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:30px}
.foot h5{color:var(--ink);font-size:12.5px;margin-bottom:13px}
.foot a{display:block;padding:4px 0;transition:.15s}.foot a:hover{color:var(--ink)}

@media(max-width:980px){.layout{grid-template-columns:1fr}.maprail{display:none}.pd-grid{grid-template-columns:1fr}.dash{grid-template-columns:1fr}.side{position:static;display:flex;gap:6px;overflow:auto}.side .sep{display:none}.life-g,.kpis,.pipe{grid-template-columns:1fr 1fr}.pd-g{grid-template-columns:1fr 1fr;height:auto;grid-auto-rows:150px}.pd-g>div:first-child{grid-row:auto;grid-column:1/3;height:230px}.foot-g{grid-template-columns:1fr 1fr}.nlinks{display:none}}
@media(max-width:560px){.life-g,.kpis,.pipe,.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="nav"><div class="wrap nav-in">
  <div class="brand" onclick="go('discover')"><span class="mark"></span> HouseMatch<span style="color:var(--accent);font-weight:600">.ai</span></div>
  <div class="nlinks" id="nlinks"></div>
  <div class="nav-cta">

let listStep=0;
VIEWS.list=()=>`<section class="wrap section">
 <span class="eyebrow">List a property</span><h2 class="serif" style="font-size:32px;margin-top:8px;margin-bottom:22px">Publish in minutes — AI does the heavy lifting</h2>
 <div class="steps">${['The basics','Photos & details','Price & screen','Go live'].map((s,i)=>`<div class="step ${i===listStep?'on':''}"><span class="sn">${i+1}</span> ${s}</div>`).join('')}</div>
 <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:30px;align-items:start" class="two">
  <div class="panel">
   <div class="two"><div class="field"><label>Address</label><input class="input" id="li_addr" value="7 Birch Lofts, Austin TX"></div><div class="field"><label>Type</label><select class="input"><option>For rent</option><option>For sale</option></select></div></div>
   <div class="two"><div class="field"><label>Bedrooms</label><input class="input" id="li_bd" value="2"></div><div class="field"><label>Bathrooms</label><input class="input" id="li_ba" value="2"></div></div>
   <div class="field"><label>Monthly rent</label><input class="input" id="li_price" value="2450"></div>
   <div class="field"><label>Description</label><textarea id="li_desc" placeholder="Tell renters about the space…">Bright corner loft with 14-ft ceilings…</textarea>
    <div class="ai-write" onclick="aiWrite()">✦ Write it for me — AI drafts a high-converting description</div></div>
   <button class="btn pri lg" onclick="publishListing()">Publish & syndicate →</button></div>
  <div>
   <div class="panel"><h3 style="font-size:16px">✦ AI co-pilot</h3><p class="muted" style="font-size:13px;margin-bottom:14px">Live as you type</p>
    <div class="ai-note" style="margin:0 0 11px">$ <b style="margin-left:4px">Suggested rent: $2,450–$2,610.</b>&nbsp; Comparable lofts lease in ~12 days here.</div>
    <div class="ai-note" style="margin:0 0 11px;background:rgba(125,184,255,.07);border-color:rgba(125,184,255,.2);color:var(--blue)">◎ <b style="margin-left:4px">Listing health 78%.</b>&nbsp; Add 4+ photos to reach 95% and rank higher.</div>
    <div class="ai-note" style="margin:0;background:rgba(232,201,138,.08);border-color:rgba(232,201,138,.25);color:var(--gold)">⚡ <b style="margin-left:4px">One-click syndication</b>&nbsp; to HouseMatch + 12 partner networks.</div></div>
   <div class="panel" style="margin-top:16px"><h3 style="font-size:16px">Built-in screening</h3><p class="muted" style="font-size:13px;margin-bottom:14px">No third-party tools</p><div class="feat" style="grid-template-columns:1fr">${['Credit + background','Income & employment verify','Auto-rank applicants by fit','E-sign lease same day'].map(s=>`<div>✓ ${s}</div>`).join('')}</div></div>
  </div></div>
</section>`;
function aiWrite(){document.getElementById('li_desc').value="Light-drenched corner loft with soaring 14-ft ceilings and walls of glass. White-oak floors, a chef's kitchen with a waterfall island, and a private balcony over the courtyard. Steps from East Side cafés and the metro — fiber-wired, pet-friendly, and move-in ready.";toast('✦ AI drafted your description — edit anything');}
function publishListing(){const price=+document.getElementById('li_price').value||2450;const bd=+document.getElementById('li_bd').value||2;const ba=+document.getElementById('li_ba').value||2;const id='new-'+Date.now();HOMES.unshift({id,kind:'rent',price,title:document.getElementById('li_addr').value||'New Listing',city:'Austin TX',beds:bd,baths:ba,sqft:1100,match:90,hot:true,img:9,photos:[9,2,4],note:'Just listed — be the first to tour',pet:true,days:0,lat:50,lng:50,desc:document.getElementById('li_desc').value,amen:['Fiber wired','Pet friendly','In-unit laundry','Rooftop deck']});confetti();toast('🎉 Live on HouseMatch + 12 networks — applicants incoming');setTimeout(()=>go('search'),700);}

/* boot */
persist();render();
</script>
</body>
</html>
